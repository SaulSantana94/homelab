app-template:
  controllers:
    keycloak:
      labels:
        backup/retain: quaterly
      type: statefulset
      containers:
        keycloak:
          image:
            repository: quay.io/keycloak/keycloak
            tag: 26.5.5
            pullPolicy: IfNotPresent

          args:
            - start

          env:
            KC_DB: postgres
            KC_DB_URL_HOST: keycloak-postgres
            KC_DB_URL_PORT: "5432"
            KC_DB_URL_DATABASE: keycloak

            KC_HOSTNAME: "https://keycloak.sasancloud.com"

            KC_HTTP_RELATIVE_PATH: "/"
            KC_HTTP_ENABLED: "true"
            KC_HTTP_HOST: "0.0.0.0"
            KC_HTTP_PORT: "8080"

            KC_PROXY_HEADERS: "xforwarded"

            KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_SUCCESS_LEVEL: "info"
            KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_ERROR_LEVEL: "warn"
            KC_SPI_CONTENT_SECURITY_POLICY_RESPONSE_HEADER: "frame-src 'self' https:; frame-ancestors 'self' https:; object-src 'none';"

            KC_LOG_LEVEL: info

            KC_HTTP_MANAGEMENT_PORT: "9000"
            KC_HEALTH_ENABLED: "true"
            KC_METRICS_ENABLED: "true"

          envFrom:
          - secretRef:
              name: keycloak-secrets

          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              cpu: 800m
              memory: 1500Mi
            
  service:
    keycloak:
      controller: keycloak
      ports:
        http:
          port: 8080

  ingress:
    external:
      enabled: true
      className: nginx-external
      annotations:
        external-dns.alpha.kubernetes.io/enabled: "true"
        external-dns.alpha.kubernetes.io/target: sasancloud.com
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
      hosts:
      - host: &host keycloak.sasancloud.com
        paths:
        - path: /
          pathType: Prefix
          service:
            identifier: keycloak
            port: http
      tls:
      - hosts:
        - *host
        secretName: keycloak-external-tls-certificate

  defaultPodOptions:
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
      fsGroupChangePolicy: "OnRootMismatch"

  persistence:
    providers:
      enabled: true
      type: configMap
      name: keycloak-providers
      globalMounts:
        - path: /opt/keycloak/providers
          readOnly: true