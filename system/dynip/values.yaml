app-template:
  controllers:
    dynip:
      labels:
        backup/retain: quaterly
      type: statefulset
      containers:
        dynip:
          image:
            repository: bolferdocker/dynip
            tag: latest

          env:
            TZ: Europe/Madrid
            DOMAIN_NAME: sasancloud.com
            CNAME_TAGS: wireguard.sasancloud.com #accepts comma separated tags like wireguard.sasancloud.com,example.sasancloud.com
          envFrom:
          - secretRef:
              name: dynip-secrets

          resources:
            requests:
              cpu: 500m
              memory: 1800Mi
            limits:
              memory: 4000Mi
