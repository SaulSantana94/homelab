argo-cd:
  configs:
    cm:
      create: true
      # Logical Argo CD URL (used in links and UI, not exposed here)
      url: https://argocd.local
      # Disable OIDC integration for now
      oidc.config: ""

    params:
      # Run the Argo CD API server without TLS inside the cluster
      server.insecure: true

    secret:
      createSecret: true

  dex:
    # Dex is not needed unless you're using an external IdP (e.g. Keycloak, Google)
    enabled: false

  server:
    ingress:
      # No ingress for now – K3s has Traefik but we’ll keep it internal
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  controller:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 600m
        memory: 768Mi

  repoServer:
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 150
      targetMemoryUtilizationPercentage: 90
    resources:
      limits:
        cpu: 400m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
    env:
      
  redis:
    resources:
      limits:
        cpu: 150m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

  applicationSet:
    enabled: true
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 25m
        memory: 128Mi

  notifications:
    # Disable notifications until external integrations are available
    enabled: false